<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>JARVIS</title>
<style>
body{background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;overflow:hidden}
.orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#00e5ff,transparent 70%);box-shadow:0 0 40px #00e5ff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.5s}
.orb.active{opacity:1}
.orb:active{transform:scale(0.92)}
.inner{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#fff,#00e5ff 50%,transparent 70%)}
.status{margin-top:40px;font-family:monospace;font-size:13px;color:#00e5ff;letter-spacing:3px;opacity:0;transition:opacity 0.5s}
.status.active{opacity:1}
.bubble{position:absolute;top:60px;left:50%;transform:translateX(-50%);max-width:280px;padding:12px 16px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.25);border-radius:10px;font-size:14px;color:#fff;opacity:0;transition:opacity 0.4s}
.bubble.show{opacity:1}
.tap-screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:100;background:#000}
.tap-text{font-family:monospace;font-size:14px;color:#00e5ff;letter-spacing:3px;margin-bottom:20px}
.tap-btn{background:rgba(0,229,255,0.15);border:1px solid rgba(0,229,255,0.4);border-radius:8px;padding:12px 24px;font-family:monospace;font-size:12px;color:#00e5ff;cursor:pointer}
</style>
</head>
<body>
<div class="tap-screen" id="tap-screen">
  <div class="tap-text">TAP TO ACTIVATE J.A.R.V.I.S.</div>
  <button class="tap-btn" id="tap-btn">INITIALIZE</button>
</div>
<div class="orb" id="core"><div class="inner"></div></div>
<div class="status" id="status">STANDBY</div>
<div class="bubble" id="bubble"></div>

<script>
const core=document.getElementById('core');
const status=document.getElementById('status');
const bubble=document.getElementById('bubble');
const tapScreen=document.getElementById('tap-screen');
const tapBtn=document.getElementById('tap-btn');
let speaking=false;
let voicesLoaded=false;

function loadVoices(){
  return new Promise((resolve)=>{
    let attempts=0;
    const check=()=>{
      const voices=speechSynthesis.getVoices();
      if(voices.length>0 || attempts>20){
        voicesLoaded=true;
        resolve(voices);
      }else{
        attempts++;
        setTimeout(check,100);
      }
    };
    check();
    if(speechSynthesis.onvoiceschanged!==undefined){
      speechSynthesis.onvoiceschanged=()=>{voicesLoaded=true;resolve(speechSynthesis.getVoices());};
    }
  });
}

function speak(text){
  speaking=true;
  status.textContent='SPEAKING';
  bubble.textContent=text;
  bubble.classList.add('show');
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.95;u.pitch=0.85;u.volume=1;
  const voices=speechSynthesis.getVoices();
  const d=voices.find(v=>v.name.includes('Daniel'));
  if(d)u.voice=d;
  u.onend=()=>{speaking=false;status.textContent='STANDBY';bubble.classList.remove('show')};
  u.onerror=()=>{speaking=false;status.textContent='STANDBY';bubble.classList.remove('show')};
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function init(){
  tapScreen.style.opacity='0';
  setTimeout(()=>{tapScreen.style.display='none';},500);
  core.classList.add('active');
  status.classList.add('active');
  loadVoices().then(()=>{
    speak('Welcome home, sir. J.A.R.V.I.S. is online and at your service.');
  });
}

tapBtn.addEventListener('click',()=>{
  speechSynthesis.cancel();
  const silent=new SpeechSynthesisUtterance('');
  silent.volume=0;
  speechSynthesis.speak(silent);
  init();
});

core.addEventListener('click',()=>{
  if(speaking)return;
  const rec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!rec){speak('Voice not supported');return;}
  const r=new rec();
  r.lang='en-US';r.interimResults=true;
  r.onstart=()=>status.textContent='LISTENING';
  r.onresult=(e)=>{
    const t=e.results[0][0].transcript;
    if(e.results[0].isFinal){
      status.textContent='PROCESSING';
      setTimeout(()=>process(t),300);
    }
  };
  r.onerror=()=>status.textContent='STANDBY';
  r.onend=()=>{if(!speaking)status.textContent='STANDBY'};
  r.start();
});

function process(text){
  const cmd=text.toLowerCase().trim();
  let resp='';
  if(cmd.includes('hello'))resp='Hello, sir. J.A.R.V.I.S. online. Ready.';
  else if(cmd.includes('time')){const n=new Date();resp='Time is '+n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+', sir.'}
  else if(cmd.includes('text')||cmd.includes('message')){resp='Opening Messages, sir.';setTimeout(()=>window.location.href='sms:',1500)}
  else if(cmd.includes('call')||cmd.includes('phone')){resp='Opening Phone, sir.';setTimeout(()=>window.location.href='tel:',1500)}
  else resp='Understood: "'+text+'". Learning. Another task, sir?';
  speak(resp);
}
</script>
</body>
</html>
